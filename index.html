<!doctype html>

  <head>

    <link

    <link
      rel="apple-touch-icon"

    <!-- css -->

  <body>
    <!-- 전체 레이아웃 -->
    <div class="wrap">
      <!-- header -->
      <header class="header">
        <div class="inner">
          <!-- logo -->
          <a href="#"
            ><div class="logo">
              <img src="images/logo.jpeg" alt="logo" />
              <h2>따순해</h2>
            </div></a
          >

          <!-- menu -->
          <div class="menu-wrap">
            <ul class="menu">
              <li><a href="#">About</a></li>
              <li><a href="#">Story</a></li>
              <li><a href="#">donation</a></li>
              <li><a href="#">Products</a></li>
            </ul>
          </div>

          <!-- mobile menu -->
          <div class="hambuger">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

      <!-- visual -->
      <div class="visual">
        <h1>따순해</h1>
        <div class="visual-contents">
          <p class="visual-txt">유기동물에게 따스한 희망을 전합니다 ☘️</p>
          <button class="btn" type="submit">희망 전하러 가기</button>
        </div>

      <!-- about -->
      <div class="about">
        <div class="inner">
          <div class="about-bg"></div>
        </div>
      </div>

      <!-- cat story -->
      <div class="cat-story">
        <div class="inner">
          <!-- title -->
          <h2>따순해 고양이 이야기</h2>
          <div class="cat-contents">
            <div class="cat-right">
              <!-- img -->
              <img src="images/products/p7.jpg" alt="catstory" />
            </div>
            <div class="cat-left">
              <!-- explain -->
              <p>
                따순해의 모든 제품은 <br />조금 더
                <span class="highlight">특별한 의미</span>를 담고 있어요.
              </p>
              <p>
                여러분이 선택해주신 작은 마음은 <br /><span class="highlight"
                  >유기묘 보호소의 고양이들을 위한 물품</span
                >으로 전해집니다.
              </p>
              <p>
                그저 예쁜 것을 고르는 순간이 <br />누군가에겐 따뜻한 하루가
                됩니다.
              </p>
              <!-- btn -->
              <button class="btn" type="submit">
                후원 내역 보러가기
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- donation story-->

      <!-- sponsor -->

      <!-- footer -->
